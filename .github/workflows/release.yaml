name: Release to NPM

# Prerelease builds run when there's a push to `main`,
# and release builds are published when a tag is pushed
on:
  push:
    tags:
      - '*'
    branches:
      - main

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.ref != 'refs/heads/main'}}
    name: 'Publish Release'
    steps:
    - uses: actions/checkout@v7

      # Set up Node
    - name: Use Node 22
      uses: actions/setup-node@v7
      with:
        node-version: 22
        registry-url: 'https://registry.npmjs.org'

    - name: Use npm 12
      run: npm install npm@^12 -g

    - name: Install dependencies
      run: npm ci

    - name: Run build
      run: npm run build

    - name: Run Tests
      run: npm test

    - name: Run Check Dependencies
      run: npm run check-dependencies

    - name: Publish Release to npm
      run: |
        echo "npm version $(npm -v)"
        NODE_AUTH_TOKEN="" npm publish --access public --provenance

      # Get the current package.json version so we can tag the image correctly
    - name: Get current package.json version
      id: package-version
      uses: martinbeentjes/npm-get-version-action@7aa1d82604bb2dbe377a64ca35e692e6fe333c9c #master

      # Setup QEMU as requirement for docker
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v1
      
      # Setup DockerBuildx as requirement for docker
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

      # Login to Quay
    - name: Login to Quay
      uses: docker/login-action@v1
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_USERNAME }}
        password: ${{ secrets.QUAY_TOKEN }}

      # Build and push the latest version of yaml language server image
    - name: Build and push
      uses: docker/build-push-action@v2
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          quay.io/redhat-developer/yaml-language-server:latest
          quay.io/redhat-developer/yaml-language-server:${{ steps.package-version.outputs.current-version}}
  
  prerelease:
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main'}}
    name: 'Publish Prerelease'
    steps:
    - uses: actions/checkout@v7

    - name: Use Node 22
      uses: actions/setup-node@v7
      with:
        node-version: 22
        registry-url: 'https://registry.npmjs.org'

    - name: Use npm 12
      run: npm install npm@^12 -g

    - name: Install dependencies
      run: npm ci

    - name: Run build
      run: npm run build

    - name: Run Tests
      run: npm test

    - name: Run Check Dependencies
      run: npm run check-dependencies
    
    - name: Publish Prerelease to npm
      run: |
        echo "npm version $(npm -v)"
        npm version prerelease --preid $(git rev-parse --short HEAD) --no-git-tag-version
        NODE_AUTH_TOKEN="" npm publish --tag next --provenance
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@2b82ce82d56a2a04d2637cd93a637ae1b359c0a7 # v2.2.0

      # Setup DockerBuildx as requirement for docker
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@6a58db7e0d21ca03e6c44877909e80e45217eed2 # v2.6.0

      # Login to Quay
    - name: Login to Quay
      uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc  # v2.2.0
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_USERNAME }}
        password: ${{ secrets.QUAY_TOKEN }}

      # Build and push the latest version of yaml language server image
    - name: Build and push
      uses: docker/build-push-action@44ea916f6c540f9302d50c2b1e5a8dc071f15cdf #v4.1.0
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64
        push: true
        tags: quay.io/redhat-developer/yaml-language-server:next
